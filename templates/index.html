<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EdgeOps IoT - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#d4e3ff",
                    "on-tertiary-container": "#6f4c00",
                    "inverse-on-surface": "#f1f0f5",
                    "on-secondary-fixed-variant": "#513c71",
                    "on-secondary-fixed": "#250f43",
                    "primary-fixed-dim": "#a5c9fe",
                    "surface-variant": "#e2e2e6",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#2f3034",
                    "on-tertiary": "#ffffff",
                    "outline": "#737780",
                    "surface-bright": "#f9f9fd",
                    "on-background": "#1a1c1f",
                    "on-tertiary-fixed-variant": "#604100",
                    "background": "#f9f9fd",
                    "surface": "#f9f9fd",
                    "on-surface": "#1a1c1f",
                    "surface-container-highest": "#e2e2e6",
                    "primary-container": "#a5c9ff",
                    "on-primary-fixed": "#001c39",
                    "on-secondary-container": "#614c81",
                    "on-tertiary-fixed": "#281900",
                    "surface-container": "#eeedf2",
                    "secondary-fixed-dim": "#d5bbf9",
                    "on-primary-fixed-variant": "#204876",
                    "surface-container-high": "#e8e8ec",
                    "on-primary-container": "#2e5483",
                    "tertiary": "#7d570c",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#2e5483",
                    "tertiary-container": "#f1bf6d",
                    "tertiary-fixed-dim": "#f0be6c",
                    "secondary-fixed": "#eddcff",
                    "error": "#ba1a1a",
                    "primary": "#3b608f",
                    "outline-variant": "#c3c6d0",
                    "on-error-container": "#93000a",
                    "secondary-container": "#dbc1ff",
                    "inverse-primary": "#a5c9fe",
                    "secondary": "#6a548a",
                    "surface-tint": "#3b608f",
                    "surface-container-low": "#f4f3f8",
                    "surface-dim": "#dad9de",
                    "on-error": "#ffffff",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#ffdeac"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "48px",
                    "base": "8px",
                    "sm": "12px",
                    "md": "24px",
                    "gutter": "24px",
                    "xs": "4px",
                    "margin": "32px",
                    "xl": "80px"
            },
            "fontFamily": {
                    "h2": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "body-md": ["Manrope"],
                    "h3": ["Manrope"],
                    "h1": ["Manrope"],
                    "body-lg": ["Manrope"]
            },
            "fontSize": {
                    "h2": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["13px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "h3": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "h1": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(209, 217, 230, 0.3);
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        body {
            background-color: #f9f9fd;
            overflow-x: hidden;
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>
<body class="font-body-md text-on-surface">
<!-- Background Orbs -->
<div class="orb w-[500px] h-[500px] bg-primary-container -top-40 -left-40"></div>
<div class="orb w-[400px] h-[400px] bg-secondary-container bottom-0 -right-20"></div>
<div class="orb w-[300px] h-[300px] bg-tertiary-container top-1/2 left-1/2"></div>
<!-- TopNavBar -->
<nav class="flex justify-between items-center w-full px-8 h-16 sticky top-0 bg-white/70 backdrop-blur-[20px] docked full-width z-50 border-b border-white/80 font-manrope antialiased tracking-tight shadow-[0_4px_30px_rgba(209,217,230,0.3)]">
<div class="flex items-center gap-4">
<span class="text-xl font-extrabold text-slate-800">EdgeOps Dashboard</span>
</div>
<div id="connection-container" class="flex items-center gap-2 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-200">
    <span id="connection-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
    <span id="connection-status" class="text-sm font-bold text-emerald-700">Connecting...</span>
</div>
</nav>
<!-- Main Content -->
<main class="w-full max-w-7xl mx-auto p-8 pt-6 space-y-8">
<!-- Stats Overview Section -->
<section>
<div class="flex items-center justify-between mb-6">
<h1 class="font-h2 text-h2 text-slate-900">Global Overview</h1>
</div>
<div class="grid grid-cols-1 gap-gutter md:grid-cols-2">
<!-- Total Records -->
<div class="glass p-md rounded-xl">
<div class="flex justify-between items-start mb-4">
<div class="p-2 bg-blue-50 rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="database">database</span>
</div>
<span class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded-full">Live</span>
</div>
<p class="text-label-sm font-label-sm text-slate-500 mb-1 uppercase tracking-widest">Total Records</p>
<h3 id="stat-total" class="text-h1 font-h1 text-slate-900">0</h3>
</div>
<!-- Anomalies -->
<div class="glass p-md rounded-xl border-t-4 border-t-[#ff6b6b]">
<div class="flex justify-between items-start mb-4">
<div class="p-2 bg-red-50 rounded-lg">
<span class="material-symbols-outlined text-[#ff6b6b]" data-icon="warning">warning</span>
</div>
<span class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded-full">Alerts</span>
</div>
<p class="text-label-sm font-label-sm text-slate-500 mb-1 uppercase tracking-widest">Global Anomalies</p>
<h3 id="stat-anomalies" class="text-h1 font-h1 text-[#ff6b6b]">0</h3>
</div>
</div>
</section>
<!-- Live Sensor Feed Section -->
<section>
<h2 class="text-h2 font-h2 text-slate-900 mb-6">Temperature Anomaly Status</h2>
<div id="device-stats-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
<!-- Devices injected by JS -->
</div>
</section>

<!-- Gas Sensor Status Section -->
<section class="mt-12">
<h2 class="text-h2 font-h2 text-slate-900 mb-6">Raw Gas Sensors</h2>
<div id="gas-stats-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
<!-- Devices injected by JS -->
</div>
</section>
</main>
<script src="/static/script.js"></script>
</body></html>
